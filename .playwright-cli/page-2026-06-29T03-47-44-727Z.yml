            - text: "코퀴즈 — 퀴즈 참여와 토큰 보상의 결합. 2026년 보도 기준 누적 다운로드 약 3만, 누적 상금 3억원, 누적 플레이 495만회를 공개했습니다. 교훈: 상금 규모는 매출이 아니라 보상 원가에 가깝고, 토큰형 리워드는 유동성과 반복 참여 설계가 함께 필요합니다."
